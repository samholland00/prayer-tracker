<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Daily Prayer Tracker</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6c7a89;
      --border: #e2e6ea;
      --accent: #1E3A5F;
      --accent-light: #e8eef4;
      --scripture-bg: #f1f4f7;
      --shadow: 0 1px 4px rgba(30,58,95,0.06);
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1419;
        --card-bg: #1a2332;
        --text: #e4e8ec;
        --text-muted: #8899a6;
        --border: #2a3a4a;
        --accent: #5b8abf;
        --accent-light: #1a2a3a;
        --scripture-bg: #162029;
        --shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* === HEADER === */
    .header {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 16px 0 12px;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .nav-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:active { opacity: 0.6; }

    .day-title {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .day-title span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 14px;
    }

    .period-label {
      text-align: center;
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .period-label:active { opacity: 0.6; }

    /* === DAY STATUS === */
    .day-status {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .day-complete-banner {
      text-align: center;
      color: var(--accent);
      padding: 16px 0 4px;
      font-size: 15px;
      font-weight: 600;
      animation: bannerIn 0.3s ease;
    }

    @keyframes bannerIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* === PERIOD PICKER === */
    .period-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .period-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: var(--scripture-bg);
      color: var(--text);
      font-size: 15px;
      text-align: left;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .period-item:active { opacity: 0.6; }
    .period-item.current { background: var(--accent); color: white; font-weight: 600; }

    .period-item-days {
      font-size: 12px;
      opacity: 0.7;
    }

    /* === PROGRESS BAR === */
    .progress-wrap {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* === SECTION CARDS === */
    .sections {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .section-card.completed {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .section-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .section-info { flex: 1; }

    .section-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .section-reference {
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .section-reference:hover { color: var(--accent); }

    /* === SCRIPTURE TEXT === */
    .scripture-toggle {
      display: inline-block;
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      margin-top: 6px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Full-screen scripture modal */
    .scripture-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      flex-direction: column;
    }

    .scripture-modal.open { display: flex; }

    .scripture-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .scripture-modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .scripture-modal-close {
      background: none;
      border: none;
      font-size: 28px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .scripture-modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
    }

    .scripture-text {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.8;
      color: var(--text);
      max-width: 600px;
      margin: 0 auto;
    }

    .scripture-text .verse-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      vertical-align: super;
      margin-right: 2px;
    }

    .scripture-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }

    .scripture-error {
      text-align: center;
      padding: 40px 20px;
      color: #c44;
      font-size: 15px;
    }

    /* === NOTES === */
    .notes-wrap {
      margin-top: 12px;
    }

    .notes-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .notes-textarea {
      width: 100%;
      min-height: 60px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--scripture-bg);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    .notes-textarea:focus {
      border-color: var(--accent);
    }

    /* === HISTORY BUTTON === */
    .history-btn {
      display: block;
      margin: 20px auto 0;
      padding: 10px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .history-btn:active { opacity: 0.6; }

    /* === HISTORY LOG === */
    .history-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      flex-direction: column;
    }

    .history-modal.open { display: flex; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .history-header h3 { font-size: 18px; }

    .history-close {
      background: none;
      border: none;
      font-size: 28px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .history-filters {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .filter-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 20px;
    }

    .history-period-heading {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 0 4px;
      position: sticky;
      top: 0;
      background: var(--bg);
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .history-item:active { opacity: 0.6; }

    .history-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-status.complete { background: var(--accent); }
    .history-status.partial { background: #c4883c; }
    .history-status.not-started { background: var(--border); }

    .history-info { flex: 1; min-width: 0; }

    .history-day-label {
      font-size: 14px;
      font-weight: 600;
    }

    .history-readings {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .history-badge.complete { background: var(--accent-light); color: var(--accent); }
    .history-badge.partial { background: #fdf3dc; color: #8a6b2e; }
    .history-badge.not-started { background: var(--scripture-bg); color: var(--text-muted); }

    @media (prefers-color-scheme: dark) {
      .history-badge.partial { background: #2d2a1e; color: #c4883c; }
    }

    /* === DAY PICKER MODAL === */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 18px;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: var(--scripture-bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .day-cell:active { opacity: 0.6; }
    .day-cell.current { background: var(--accent); color: white; font-weight: 700; }
    .day-cell.all-done { background: var(--accent-light); color: var(--accent); }
    .day-cell.unavailable { opacity: 0.3; pointer-events: none; }

    .modal-close {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--border);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }
    /* === SIGN-IN SCREEN === */
    .signin-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .signin-screen.hidden { display: none; }

    .signin-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .signin-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 40px;
      text-align: center;
      line-height: 1.5;
    }

    .signin-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
    }

    .signin-btn:active { opacity: 0.7; }

    .signin-btn svg {
      width: 20px;
      height: 20px;
    }

    /* === USER BAR === */
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 0 0;
    }

    .user-bar.hidden { display: none; }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .user-name {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      text-align: right;
    }

    .signout-btn {
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      -webkit-tap-highlight-color: transparent;
    }

    .sync-indicator {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 2px 0;
    }

  </style>
</head>
<body>

  <!-- Sign-in screen -->
  <div class="signin-screen" id="signinScreen">
    <div class="signin-title">Prayer Tracker</div>
    <div class="signin-subtitle">A 365-day Bible reading guide.<br>Sign in to sync your progress across devices.</div>
    <button class="signin-btn" id="signinBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>

  <div class="header">
    <div class="user-bar hidden" id="userBar">
      <img class="user-avatar" id="userAvatar" src="" alt="">
      <span class="user-name" id="userName"></span>
      <button class="signout-btn" id="signoutBtn">Sign out</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="day-title" id="dayTitle"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="period-label" id="periodLabel"></div>
    <div class="day-status" id="dayStatus"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <div class="sections" id="sections"></div>

  <button class="history-btn" id="historyBtn">View History</button>

  <!-- History log -->
  <div class="history-modal" id="historyModal">
    <div class="history-header">
      <h3>Reading History</h3>
      <button class="history-close" id="historyClose">&times;</button>
    </div>
    <div class="history-filters" id="historyFilters"></div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Full-screen scripture reader -->
  <div class="scripture-modal" id="scriptureModal">
    <div class="scripture-modal-header">
      <div class="scripture-modal-title" id="scriptureModalTitle"></div>
      <button class="scripture-modal-close" id="scriptureModalClose">&times;</button>
    </div>
    <div class="scripture-modal-body">
      <div class="scripture-text" id="scriptureModalText"></div>
    </div>
  </div>

  <div class="modal-overlay" id="dayPickerModal">
    <div class="modal">
      <h3>Jump to Day</h3>
      <div class="day-grid" id="dayGrid"></div>
      <button class="modal-close" id="modalClose">Cancel</button>
    </div>
  </div>

  <div class="modal-overlay" id="periodPickerModal">
    <div class="modal">
      <h3>Jump to Period</h3>
      <div class="period-list" id="periodList"></div>
      <button class="modal-close" id="periodModalClose">Cancel</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== FIREBASE =====
    firebase.initializeApp({
      apiKey: "AIzaSyDba4Crin-xBZpIgBzu2XdizYsD-kc6m_4",
      authDomain: "prayer-tracker-d0cee.firebaseapp.com",
      projectId: "prayer-tracker-d0cee",

    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let firestoreReady = false;

    // ===== CONFIG =====
    const BIBLE_TRANSLATION = 'ESV';
    const STORAGE_KEYS = {
      progress: 'prayer-tracker-progress',
      notes: 'prayer-tracker-notes',
      currentDay: 'prayer-tracker-current-day',
    };

    // ===== BOOK NAME MAPPING FOR API =====
    const BOOK_MAP = {
      'Genesis': 1, 'Exodus': 2, 'Leviticus': 3, 'Numbers': 4, 'Deuteronomy': 5,
      'Joshua': 6, 'Judges': 7, 'Ruth': 8, '1 Samuel': 9, '2 Samuel': 10,

      'Isaiah': 23, 'Jeremiah': 24, 'Lamentations': 25, 'Ezekiel': 26, 'Daniel': 27,
      'Hosea': 28, 'Joel': 29, 'Amos': 30, 'Obadiah': 31, 'Jonah': 32,
      'Micah': 33, 'Nahum': 34, 'Habakkuk': 35, 'Zephaniah': 36, 'Haggai': 37,
      'Zechariah': 38, 'Malachi': 39,
      'Matthew': 40, 'Mark': 41, 'Luke': 42, 'John': 43, 'Acts': 44,
      'Romans': 45, '1 Corinthians': 46, '2 Corinthians': 47, 'Galatians': 48,
      'Ephesians': 49, 'Philippians': 50, 'Colossians': 51, '1 Thessalonians': 52,
      '2 Thessalonians': 53, '1 Timothy': 54, '2 Timothy': 55, 'Titus': 56,
      'Philemon': 57, 'Hebrews': 58, 'James': 59, '1 Peter': 60, '2 Peter': 61,
      '1 John': 62, '2 John': 63, '3 John': 64, 'Jude': 65, 'Revelation': 66,
    };

    // ===== STATE =====
    let currentDay = parseInt(localStorage.getItem(STORAGE_KEYS.currentDay)) || 1;
    let progress = JSON.parse(localStorage.getItem(STORAGE_KEYS.progress) || '{}');
    let notes = JSON.parse(localStorage.getItem(STORAGE_KEYS.notes) || '{}');
    const scriptureCache = {};

    // ===== DATE HELPER =====
    function dayToDate(day) {
      // Day 1 = Jan 1 of current year
      const jan1 = new Date(new Date().getFullYear(), 0, 1);
      const date = new Date(jan1.getTime() + (day - 1) * 86400000);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ===== PERSISTENCE =====
    function saveProgress() {
      localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(progress));
      syncToFirestore({ progress });
    }
    function saveNotes() {
      localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(notes));
      syncToFirestore({ notes });
    }
    function saveCurrentDay() {
      localStorage.setItem(STORAGE_KEYS.currentDay, currentDay);
      syncToFirestore({ currentDay });
    }

    // Debounced Firestore sync
    let syncTimer;
    let pendingSync = {};

    function syncToFirestore(data) {
      if (!currentUser) return;
      Object.assign(pendingSync, data);
      clearTimeout(syncTimer);
      syncTimer = setTimeout(async () => {
        const toSync = { ...pendingSync };
        pendingSync = {};
        try {
          await db.collection('users').doc(currentUser.uid).set(toSync, { merge: true });
        } catch (e) {
          console.error('Firestore sync error:', e);
        }
      }, 1000);
    }

    async function loadFromFirestore() {
      if (!currentUser) return false;
      try {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if (doc.exists) {
          const data = doc.data();
          if (data.progress) { progress = data.progress; localStorage.setItem(STORAGE_KEYS.progress, JSON.stringify(progress)); }
          if (data.notes) { notes = data.notes; localStorage.setItem(STORAGE_KEYS.notes, JSON.stringify(notes)); }
          if (data.currentDay) { currentDay = data.currentDay; localStorage.setItem(STORAGE_KEYS.currentDay, currentDay); }
          return true;
        }
        return false;
      } catch (e) {
        console.error('Firestore load error:', e);
        return false;
      }
    }

    async function migrateLocalToFirestore() {
      if (!currentUser) return;
      // If user has local data but no Firestore data, push local to cloud
      const doc = await db.collection('users').doc(currentUser.uid).get();
      if (!doc.exists && (Object.keys(progress).length > 0 || Object.keys(notes).length > 0)) {
        await db.collection('users').doc(currentUser.uid).set({
          progress, notes, currentDay
        });
      }
    }

    // ===== BIBLE TEXT FETCHING =====
    function parseReference(ref) {
      // Parse references like "Genesis 1-2", "Psalm 19", "Proverbs 1:1-7"
      const match = ref.match(/^(\d?\s?[A-Za-z\s]+?)\s+(\d+)(?::(\d+))?(?:-(\d+)(?::(\d+))?)?$/);
      if (!match) return null;

      const book = match[1].trim();
      const startChapter = parseInt(match[2]);
      const startVerse = match[3] ? parseInt(match[3]) : null;
      const end = match[4] ? parseInt(match[4]) : null;
      const endVerse = match[5] ? parseInt(match[5]) : null;

      const bookId = BOOK_MAP[book];
      if (!bookId) return null;

      // Determine if range is chapters or verses
      if (startVerse !== null && end !== null && endVerse === null) {
        // Format: "Proverbs 1:1-7" (verse range within one chapter)
        return { book, bookId, chapters: [startChapter], startVerse, endVerse: end };
      } else if (startVerse !== null && end !== null && endVerse !== null) {
        // Format: "Psalm 119:57-120" or cross-chapter verse range
        return { book, bookId, chapters: [startChapter], startVerse, endVerse: end };
      } else if (end !== null) {
        // Format: "Genesis 1-2" (chapter range)
        const chapters = [];
        for (let i = startChapter; i <= end; i++) chapters.push(i);
        return { book, bookId, chapters, startVerse: null, endVerse: null };
      } else {
        // Single chapter: "Psalm 19"
        return { book, bookId, chapters: [startChapter], startVerse: null, endVerse: null };
      }
    }

    async function fetchScripture(reference) {
      if (scriptureCache[reference]) return scriptureCache[reference];

      const parsed = parseReference(reference);
      if (!parsed) return { error: 'Could not parse reference: ' + reference };

      try {
        let allVerses = [];
        for (const chapter of parsed.chapters) {
          const url = `https://bolls.life/get-chapter/${BIBLE_TRANSLATION}/${parsed.bookId}/${chapter}/`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(`API error: ${res.status}`);
          const verses = await res.json();
          allVerses = allVerses.concat(verses);
        }

        // Filter by verse range if specified
        if (parsed.startVerse !== null) {
          allVerses = allVerses.filter(v => v.verse >= parsed.startVerse && v.verse <= (parsed.endVerse || parsed.startVerse));
        }

        const result = { verses: allVerses };
        scriptureCache[reference] = result;
        return result;
      } catch (e) {
        return { error: 'Failed to load scripture. Check your connection.' };
      }
    }

    function renderVerses(data) {
      if (data.error) return `<div class="scripture-error">${data.error}</div>`;
      return data.verses.map(v => {
        const text = v.text.replace(/<[^>]*>/g, ''); // strip HTML tags from comments
        return `<span class="verse-num">${v.verse}</span>${text}`;
      }).join(' ');
    }

    // ===== UI RENDERING =====
    const SECTION_KEYS = ['period', 'first', 'second', 'psalms'];
    const SECTION_LABELS = {
      period: 'Period',
      first: 'First Reading',
      second: 'Second Reading',
      psalms: 'Psalms / Proverbs / Song',
    };

    function getDayData(day) {
      return READING_PLAN.find(d => d.day === day);
    }

    function getDayProgress(day) {
      return progress[day] || {};
    }

    function getDayNotes(day) {
      return notes[day] || {};
    }

    function renderDay() {
      const data = getDayData(currentDay);
      const maxDay = READING_PLAN.length;

      // Header
      const dateStr = dayToDate(currentDay);
      document.getElementById('dayTitle').innerHTML = `Day ${currentDay} <span>· ${dateStr}</span>`;
      document.getElementById('dayTitle').style.cursor = 'pointer';
      document.getElementById('dayTitle').onclick = openDayPicker;
      const periodEl = document.getElementById('periodLabel');
      if (data) {
        const p = PERIODS.find(p => currentDay >= p.start && currentDay <= p.end);
        const dayInPeriod = currentDay - p.start + 1;
        const periodTotal = p.end - p.start + 1;
        periodEl.textContent = `${data.period} · Day ${dayInPeriod} of ${periodTotal}`;
      } else {
        periodEl.textContent = '';
      }
      periodEl.onclick = openPeriodPicker;

      // Nav buttons
      document.getElementById('prevBtn').disabled = currentDay <= 1;
      document.getElementById('nextBtn').disabled = currentDay >= maxDay;

      // Progress
      updateProgress();

      if (!data) {
        document.getElementById('sections').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No readings available for this day yet.<br>More days coming soon!</div>';
        return;
      }

      const dayProgress = getDayProgress(currentDay);
      const dayNotes = getDayNotes(currentDay);

      const sections = [
        { key: 'period', label: 'Period', value: data.period, hasScripture: false, hasNotes: false, hasCheckbox: false },
        { key: 'first', label: 'First Reading', value: data.firstReading, hasScripture: true, hasNotes: true, hasCheckbox: true },
        { key: 'second', label: 'Second Reading', value: data.secondReading, hasScripture: true, hasNotes: true, hasCheckbox: true },
        { key: 'psalms', label: 'Psalms / Proverbs / Song', value: data.psalms, hasScripture: true, hasNotes: true, hasCheckbox: true },
      ];

      let html = sections
        .filter(s => s.value) // skip null sections
        .map(s => {
          const checked = dayProgress[s.key] ? 'checked' : '';
          const completed = s.hasCheckbox && dayProgress[s.key] ? 'completed' : '';
          const noteVal = dayNotes[s.key] || '';

          let scriptureHtml = '';
          if (s.hasScripture) {
            scriptureHtml = `
              <div class="scripture-toggle" data-ref="${s.value}" data-key="${s.key}">
                ▶ Read Scripture
              </div>`;
          }

          let notesHtml = '';
          if (s.hasNotes) {
            notesHtml = `
              <div class="notes-wrap">
                <div class="notes-label">Notes</div>
                <textarea class="notes-textarea" data-key="${s.key}" placeholder="Write your thoughts...">${noteVal}</textarea>
              </div>`;
          }

          const checkboxHtml = s.hasCheckbox
            ? `<div class="checkbox ${checked}" data-key="${s.key}"></div>`
            : '';

          return `
            <div class="section-card ${completed}" data-key="${s.key}">
              <div class="section-header">
                ${checkboxHtml}
                <div class="section-info">
                  <div class="section-label">${s.label}</div>
                  <div class="section-reference">${s.value}</div>
                  ${scriptureHtml}
                </div>
              </div>
              ${notesHtml}
            </div>`;
        }).join('');

      // Day status + completion banner
      const sectionKeys = [];
      if (data.firstReading) sectionKeys.push('first');
      if (data.secondReading) sectionKeys.push('second');
      if (data.psalms) sectionKeys.push('psalms');
      const checkedCount = sectionKeys.filter(k => dayProgress[k]).length;
      const totalCount = sectionKeys.length;
      const dayComplete = totalCount > 0 && checkedCount === totalCount;

      if (dayComplete) {
        document.getElementById('dayStatus').textContent = '';
        html += '<div class="day-complete-banner">✓ Day Complete</div>';
      } else {
        document.getElementById('dayStatus').textContent = `${checkedCount} of ${totalCount} readings complete`;
      }

      document.getElementById('sections').innerHTML = html;

      // Bind events
      document.querySelectorAll('.checkbox').forEach(cb => {
        cb.addEventListener('click', () => {
          const key = cb.dataset.key;
          if (!progress[currentDay]) progress[currentDay] = {};
          progress[currentDay][key] = !progress[currentDay][key];
          saveProgress();
          renderDay();
        });
      });

      document.querySelectorAll('.scripture-toggle').forEach(toggle => {
        toggle.addEventListener('click', () => {
          const ref = toggle.dataset.ref;
          openScriptureModal(ref);
        });
      });

      let noteTimer;
      document.querySelectorAll('.notes-textarea').forEach(ta => {
        ta.addEventListener('input', () => {
          const key = ta.dataset.key;
          if (!notes[currentDay]) notes[currentDay] = {};
          notes[currentDay][key] = ta.value;
          clearTimeout(noteTimer);
          noteTimer = setTimeout(saveNotes, 500);
        });
      });
    }

    function updateProgress() {
      const maxDay = READING_PLAN.length;
      let completedDays = 0;
      for (let i = 1; i <= maxDay; i++) {
        const dp = progress[i];
        if (!dp) continue;
        const dayData = getDayData(i);
        if (!dayData) continue;
        const keys = [];
        if (dayData.firstReading) keys.push('first');
        if (dayData.secondReading) keys.push('second');
        if (dayData.psalms) keys.push('psalms');
        if (keys.length > 0 && keys.every(k => dp[k])) completedDays++;
      }
      const pct = Math.round((completedDays / maxDay) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${completedDays}/${maxDay} days`;
    }

    // ===== DAY PICKER =====
    function openDayPicker() {
      const maxDay = READING_PLAN.length;
      const grid = document.getElementById('dayGrid');
      let html = '';
      for (let i = 1; i <= maxDay; i++) {
        const isCurrent = i === currentDay ? 'current' : '';
        const dp = progress[i];
        const dayData = getDayData(i);
        let allDone = '';
        if (dp && dayData) {
          const keys = [];
          if (dayData.firstReading) keys.push('first');
          if (dayData.secondReading) keys.push('second');
          if (dayData.psalms) keys.push('psalms');
          if (keys.length > 0 && keys.every(k => dp[k])) allDone = 'all-done';
        }
        html += `<button class="day-cell ${isCurrent} ${allDone}" data-day="${i}">${i}</button>`;
      }
      grid.innerHTML = html;

      grid.querySelectorAll('.day-cell').forEach(cell => {
        cell.addEventListener('click', () => {
          currentDay = parseInt(cell.dataset.day);
          saveCurrentDay();
          closeDayPicker();
          renderDay();
        });
      });

      document.getElementById('dayPickerModal').classList.add('open');
    }

    function closeDayPicker() {
      document.getElementById('dayPickerModal').classList.remove('open');
    }

    // ===== NAVIGATION =====
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentDay > 1) {
        currentDay--;
        saveCurrentDay();
        renderDay();
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentDay < READING_PLAN.length) {
        currentDay++;
        saveCurrentDay();
        renderDay();
      }
    });

    document.getElementById('modalClose').addEventListener('click', closeDayPicker);
    document.getElementById('dayPickerModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDayPicker();
    });

    // Swipe navigation
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 80) {
        if (diff > 0 && currentDay < READING_PLAN.length) { currentDay++; saveCurrentDay(); renderDay(); }
        else if (diff < 0 && currentDay > 1) { currentDay--; saveCurrentDay(); renderDay(); }
      }
    }, { passive: true });

    // ===== HISTORY LOG =====
    function getDayStatus(day) {
      const dp = progress[day];
      const dayData = getDayData(day);
      if (!dp || !dayData) return 'not-started';
      const keys = [];
      if (dayData.firstReading) keys.push('first');
      if (dayData.secondReading) keys.push('second');
      if (dayData.psalms) keys.push('psalms');
      const checked = keys.filter(k => dp[k]).length;
      if (checked === 0) return 'not-started';
      if (checked === keys.length) return 'complete';
      return 'partial';
    }

    function getDayStatusLabel(status) {
      if (status === 'complete') return 'Done';
      if (status === 'partial') return 'In Progress';
      return 'Not Started';
    }

    function openHistory() {
      const filtersEl = document.getElementById('historyFilters');
      const listEl = document.getElementById('historyList');

      // Render filters
      const filters = ['All', 'Complete', 'In Progress', 'Not Started'];
      filtersEl.innerHTML = filters.map((f, i) =>
        `<button class="filter-btn ${i === 0 ? 'active' : ''}" data-filter="${f}">${f}</button>`
      ).join('');

      function renderList(filter) {
        let html = '';
        let lastPeriod = '';

        for (let d = 1; d <= READING_PLAN.length; d++) {
          const dayData = getDayData(d);
          if (!dayData) continue;
          const status = getDayStatus(d);

          if (filter === 'Complete' && status !== 'complete') continue;
          if (filter === 'In Progress' && status !== 'partial') continue;
          if (filter === 'Not Started' && status !== 'not-started') continue;

          const p = PERIODS.find(p => d >= p.start && d <= p.end);
          const periodKey = p.name + p.start;
          if (periodKey !== lastPeriod) {
            html += `<div class="history-period-heading">${p.name} (Days ${p.start}-${p.end})</div>`;
            lastPeriod = periodKey;
          }

          const readings = [dayData.firstReading, dayData.secondReading, dayData.psalms].filter(Boolean).join(', ');

          html += `
            <div class="history-item" data-day="${d}">
              <div class="history-status ${status}"></div>
              <div class="history-info">
                <div class="history-day-label">Day ${d} · ${dayToDate(d)}</div>
                <div class="history-readings">${readings}</div>
              </div>
              <div class="history-badge ${status}">${getDayStatusLabel(status)}</div>
            </div>`;
        }

        if (!html) html = '<div style="text-align:center;padding:40px;color:var(--text-muted)">No days match this filter</div>';
        listEl.innerHTML = html;

        listEl.querySelectorAll('.history-item').forEach(item => {
          item.addEventListener('click', () => {
            currentDay = parseInt(item.dataset.day);
            saveCurrentDay();
            closeHistory();
            renderDay();
          });
        });
      }

      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderList(btn.dataset.filter);
        });
      });

      renderList('All');
      document.getElementById('historyModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeHistory() {
      document.getElementById('historyModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('historyBtn').addEventListener('click', openHistory);
    document.getElementById('historyClose').addEventListener('click', closeHistory);

    // ===== PERIOD PICKER =====
    const PERIODS = [
      { name: "Early World", start: 1, end: 5 },
      { name: "Patriarchs", start: 6, end: 26 },
      { name: "Egypt and Exodus", start: 27, end: 51 },
      { name: "Desert Wanderings", start: 52, end: 80 },
      { name: "Conquest and Judges", start: 81, end: 98 },
      { name: "Messianic Checkpoint", start: 99, end: 105 },
      { name: "Royal Kingdom", start: 106, end: 153 },
      { name: "Messianic Checkpoint", start: 154, end: 161 },
      { name: "Divided Kingdom", start: 162, end: 182 },
      { name: "Exile", start: 183, end: 257 },
      { name: "Messianic Checkpoint", start: 258, end: 266 },
      { name: "Return", start: 267, end: 281 },
      { name: "Maccabean Revolt", start: 282, end: 312 },
      { name: "Messianic Fulfillment", start: 313, end: 321 },
      { name: "The Church", start: 322, end: 365 },
    ];

    function openPeriodPicker() {
      const list = document.getElementById('periodList');
      list.innerHTML = PERIODS.map(p => {
        const isCurrent = currentDay >= p.start && currentDay <= p.end ? 'current' : '';
        return `<button class="period-item ${isCurrent}" data-start="${p.start}">
          <span>${p.name}</span>
          <span class="period-item-days">Days ${p.start}-${p.end}</span>
        </button>`;
      }).join('');

      list.querySelectorAll('.period-item').forEach(btn => {
        btn.addEventListener('click', () => {
          currentDay = parseInt(btn.dataset.start);
          saveCurrentDay();
          closePeriodPicker();
          renderDay();
        });
      });

      document.getElementById('periodPickerModal').classList.add('open');
    }

    function closePeriodPicker() {
      document.getElementById('periodPickerModal').classList.remove('open');
    }

    document.getElementById('periodModalClose').addEventListener('click', closePeriodPicker);
    document.getElementById('periodPickerModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closePeriodPicker();
    });

    // ===== SCRIPTURE MODAL =====
    async function openScriptureModal(reference) {
      const modal = document.getElementById('scriptureModal');
      const titleEl = document.getElementById('scriptureModalTitle');
      const textEl = document.getElementById('scriptureModalText');

      titleEl.textContent = reference;
      textEl.innerHTML = '<div class="scripture-loading">Loading...</div>';
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';

      const data = await fetchScripture(reference);
      textEl.innerHTML = renderVerses(data);
    }

    function closeScriptureModal() {
      document.getElementById('scriptureModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('scriptureModalClose').addEventListener('click', closeScriptureModal);

    // ===== AUTH =====
    function showApp() {
      document.getElementById('signinScreen').classList.add('hidden');
      renderDay();
    }

    function showSignIn() {
      document.getElementById('signinScreen').classList.remove('hidden');
      document.getElementById('userBar').classList.add('hidden');
    }

    function updateUserBar(user) {
      const bar = document.getElementById('userBar');
      if (user) {
        bar.classList.remove('hidden');
        document.getElementById('userAvatar').src = user.photoURL || '';
        document.getElementById('userName').textContent = user.displayName || user.email;
      } else {
        bar.classList.add('hidden');
      }
    }

    document.getElementById('signinBtn').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    });

    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await auth.signOut();
    });

    // Auth state listener
    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      if (user) {
        updateUserBar(user);
        const loaded = await loadFromFirestore();
        if (!loaded) await migrateLocalToFirestore();
        showApp();
      } else {
        showSignIn();
      }
    });
  </script>
</body>
</html>
